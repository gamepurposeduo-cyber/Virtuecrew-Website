backend:
  name: github
  repo: gamepurposeduo-cyber/Virtuecrew-Website
  branch: main

media_folder: "/"
public_folder: "/"

collections:
  - name: "homepage"
    label: "Homepage Content"
    delete: false
    editor:
      preview: false
    files:
      - file: "index.html"
        label: "Main Landing Page"
        name: "index"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
