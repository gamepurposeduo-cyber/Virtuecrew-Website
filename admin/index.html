<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtuocrew Content Manager</title>
    <link rel="stylesheet" href="https://unpkg.com/@staticcms/core@^4.0.0/dist/static-cms.css" />
</head>
<body>
    <script src="https://unpkg.com/@staticcms/core@^4.0.0/dist/static-cms.js"></script>
    <script>
        window.CMS.init({
          config: {
            backend: {
              name: 'github',
              repo: 'gamepurposeduo-cyber/Virtuecrew-Website',
              branch: 'main',
              site_domain: 'gamepurposeduo-cyber.github.io'
            },
            media_folder: '/',
            public_folder: '/',
            collections: [
              {
                name: 'homepage',
                label: 'Homepage Content',
                delete: false,
                editor: { preview: false },
                files: [
                  {
                    file: 'index.html',
                    label: 'Main Landing Page',
                    name: 'index',
                    fields: [
                      { label: 'Hero Title', name: 'hero_title', widget: 'string' },
                      { label: 'Hero Subtitle', name: 'hero_subtitle', widget: 'text' }
                    ]
                  }
                ]
              }
            ]
          }
        });
    </script>
</body>
</html>
